<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>USOS- prowadzący- admin</title>
</head>
<body>

    <div class="top">
        <h1>PROWADZĄCY</h1>
        <form action="/api/logout" method="POST">
            <button type="submit">Wyloguj</button>
        </form>
    </div>

    <nav>
        <button><a href="/home">Strona Główna</a></button>
        <button><a href="/student">Studenci</a></button>
        <button><a href="/kursy">Kursy</a></button>
        <button><a href="/prowadzacy">Prowadzacy</a></button>
    </nav>

<h1>Lista Prowadzących</h1>
<ul id="list"></ul>

<script>
    async function fetchProwadzący() {
        try {
            const response = await fetch('/api/prowadzacy');
            if (!response.ok) throw new Error('Błąd sieci');

            const prowadzacy = await response.json();
            const list = document.getElementById('list');
            list.innerHTML = '';

            prowadzacy.forEach(elem => {
                const li = document.createElement('li');
                li.textContent = `${elem.imie} ${elem.nazwisko} ID: ${elem.prowadzacy_id}`;
                list.appendChild(li);
            });

        } catch (error) {
            document.getElementById('list').innerHTML =
                `<li>Nie udało się pobrać danych ${error}</li>`;
        }
    }

    window.addEventListener('DOMContentLoaded', fetchProwadzący);
</script>

</body>
</html>
